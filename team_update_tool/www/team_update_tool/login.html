{% extends "templates/web.html" %}

{% block title %}Sign In - Team Update Tool{% endblock %}

{% block style %}
<link rel="stylesheet" href="/assets/team_update_tool/css/team_update_tool.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
body { 
  background: var(--tut-dark-gradient); 
  font-family: 'Inter', sans-serif;
}
.tut-auth-card h3, .tut-auth-card .card-header h3 { 
  font-family: 'Playfair Display', serif; 
}
</style>
{% endblock %}

{% block page_content %}
<div class="tut-auth-container">
<!-- Royal Floating Elements -->
<div class="tut-hero-shape tut-hero-shape-1" style="top: -200px; right: -150px;"></div>
<div class="tut-hero-shape tut-hero-shape-2" style="bottom: -150px; left: -150px;"></div>
<div class="tut-royal-crown" style="top: 15%; right: 10%; position: absolute; font-size: 3rem; opacity: 0.2;"></div>

<div class="tut-auth-card">
<div class="card-header">
<div class="mb-3">
<div class="d-inline-flex align-items-center justify-content-center rounded-circle royal-icon-wrap">
<i class="fas fa-crown text-white fs-4"></i>
</div>
</div>
<h3 class="royal-title">Welcome Back</h3>
<p class="mb-0 royal-subtitle">Sign in to access your dashboard</p>
</div>

<!-- Login Type Selector -->
<div class="mb-4">
<div class="d-flex gap-2">
<button type="button" class="btn btn-sm flex-fill login-type-btn active" data-type="user" onclick="setLoginType('user')">
<i class="fas fa-user me-1"></i> User Login
</button>
<button type="button" class="btn btn-sm flex-fill login-type-btn" data-type="admin" onclick="setLoginType('admin')">
<i class="fas fa-user-shield me-1"></i> Admin Login
</button>
</div>
</div>

<form id="loginForm" action="/api/method/login" method="POST">
<input type="hidden" name="redirect-to" value="/team_update_tool/dashboard">
<input type="hidden" id="login_type" name="login_type" value="user">

<div class="mb-3">
<label class="form-label fw-bold" for="login_email">
<i class="fas fa-envelope me-1" style="color: var(--tut-gold);"></i> Email
</label>
<input type="email" id="login_email" name="usr" class="form-control royal-input" required placeholder="you@example.com">
</div>
<div class="mb-4">
<label class="form-label fw-bold" for="login_password">
<i class="fas fa-lock me-1" style="color: var(--tut-gold);"></i> Password
</label>
<input type="password" id="login_password" name="pwd" class="form-control royal-input" required placeholder="Enter your password">
</div>
<button type="submit" class="btn btn-lg w-100 royal-submit-btn" id="loginBtn">
<i class="fas fa-sign-in-alt me-2"></i>
<span id="loginBtnText">Sign In</span>
</button>
</form>

<div id="loginMessage" class="mt-3" style="display:none;"></div>

<div class="text-center mt-4 pt-3 royal-footer">
<p class="text-muted mb-2">Don't have an account?</p>
<a href="/team_update_tool/signup" class="btn btn-outline-royal w-100">
<i class="fas fa-user-plus me-2"></i>
Create Account
</a>
</div>
</div>
</div>

<style>
/* Royal Auth Styles */
.tut-auth-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  position: relative;
}

.tut-auth-card {
  background: var(--tut-glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--tut-royal-border);
  border-radius: 1.5rem;
  padding: 2.5rem;
  width: 100%;
  max-width: 480px;
  position: relative;
  box-shadow: var(--tut-royal-shadow);
}

.tut-auth-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--tut-primary-gradient);
  border-radius: 1.5rem 1.5rem 0 0;
}

.tut-auth-card .card-header {
  text-align: center;
  margin-bottom: 2rem;
  background: transparent;
  border: none;
  padding: 0;
}

.royal-icon-wrap {
  width: 70px;
  height: 70px;
  background: var(--tut-primary-gradient);
  box-shadow: 0 8px 30px rgba(124, 58, 237, 0.4);
  animation: royalPulse 3s ease-in-out infinite;
}

.royal-title {
  font-size: 1.75rem;
  font-weight: 700;
  color: #1e1b4b;
  margin-bottom: 0.5rem;
  letter-spacing: -0.02em;
}

.royal-subtitle {
  color: var(--tut-text-muted);
  font-size: 0.95rem;
}

.login-type-btn {
  background: rgba(124, 58, 237, 0.05);
  border: 2px solid var(--tut-royal-border);
  color: var(--tut-text-muted);
  font-weight: 600;
  padding: 0.7rem 1rem;
  border-radius: 0.75rem;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.login-type-btn:hover {
  border-color: var(--tut-primary);
  color: var(--tut-primary);
  background: rgba(124, 58, 237, 0.1);
}
.login-type-btn.active {
  background: var(--tut-primary-gradient);
  border-color: transparent;
  color: #fff;
  box-shadow: 0 4px 15px rgba(124, 58, 237, 0.35);
}

.royal-input {
  padding: 0.875rem 1rem !important;
  border: 2px solid var(--tut-border-light);
  border-radius: 0.75rem;
  font-size: 0.95rem;
  transition: all 0.3s ease;
  background: #fafafa;
}
.royal-input:focus {
  border-color: var(--tut-primary);
  box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
  background: #fff;
}

.royal-submit-btn {
  background: var(--tut-primary-gradient) !important;
  border: none !important;
  color: #fff !important;
  padding: 1rem 1.5rem !important;
  border-radius: 0.75rem !important;
  font-weight: 700 !important;
  font-size: 1rem !important;
  box-shadow: 0 8px 25px rgba(124, 58, 237, 0.35);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
  position: relative;
  overflow: hidden;
}
.royal-submit-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: left 0.5s ease;
}
.royal-submit-btn:hover::before {
  left: 100%;
}
.royal-submit-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 35px rgba(124, 58, 237, 0.45);
}

.btn-outline-royal {
  background: transparent;
  border: 2px solid var(--tut-primary) !important;
  color: var(--tut-primary) !important;
  padding: 0.75rem 1.5rem;
  border-radius: 0.75rem;
  font-weight: 600;
  transition: all 0.3s ease;
}
.btn-outline-royal:hover {
  background: var(--tut-primary);
  color: #fff !important;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(124, 58, 237, 0.3);
}

.royal-footer {
  border-top: 1px solid var(--tut-border-light);
}

@keyframes royalPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

@media (max-width: 480px) {
  .tut-auth-card {
    padding: 1.5rem;
    border-radius: 1rem;
  }
  .royal-title {
    font-size: 1.4rem;
  }
}
</style>
{% endblock %}

{% block script %}
<script>
function setLoginType(type) {
    document.getElementById('login_type').value = type;
    document.querySelectorAll('.login-type-btn').forEach(function(btn) {
        btn.classList.remove('active');
    });
    document.querySelector('.login-type-btn[data-type="' + type + '"]').classList.add('active');
    document.getElementById('loginBtnText').textContent = type === 'admin' ? 'Admin Sign In' : 'User Sign In';
}

frappe.ready(function() {
    var form = document.getElementById('loginForm');
    if (!form) return;
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        var btn = form.querySelector('button[type="submit"]');
        var msg = document.getElementById('loginMessage');
        var email = document.getElementById('login_email').value;
        var pwd = document.getElementById('login_password').value;
        var loginType = document.getElementById('login_type').value;
    
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in...';
        msg.style.display = 'none';
    
        fetch('/api/method/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Frappe-CSRF-Token': frappe.csrf_token },
            body: JSON.stringify({ usr: email, pwd: pwd })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.message && data.message.name) {
                window.location.href = '/team_update_tool/dashboard';
            } else if (data.exc) {
                var err = JSON.parse(data.exc);
                msg.className = 'alert alert-danger border-0 rounded-3';
                msg.innerHTML = '<p class="mb-0 small"><i class="fas fa-exclamation-circle me-1"></i>' + (err[0] || 'Invalid credentials') + '</p>';
                msg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i><span id="loginBtnText">' + (loginType === 'admin' ? 'Admin Sign In' : 'User Sign In') + '</span>';
            } else {
                msg.className = 'alert alert-danger border-0 rounded-3';
                msg.innerHTML = '<p class="mb-0 small"><i class="fas fa-exclamation-circle me-1"></i>Invalid email or password.</p>';
                msg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i><span id="loginBtnText">' + (loginType === 'admin' ? 'Admin Sign In' : 'User Sign In') + '</span>';
            }
        })
        .catch(function() {
            msg.className = 'alert alert-danger border-0 rounded-3';
            msg.innerHTML = '<p class="mb-0 small"><i class="fas fa-exclamation-circle me-1"></i>Network error. Please try again.</p>';
            msg.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i><span id="loginBtnText">' + (loginType === 'admin' ? 'Admin Sign In' : 'User Sign In') + '</span>';
        });
    });
});
</script>
{% endblock %}
